<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Extremos Diários IPMA</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#050816;
color:white;
}

h1{
text-align:center;
color:#00eaff;
margin:20px;
}

#update{
text-align:center;
color:#aaa;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#0c122b;
border-radius:15px;
box-shadow:0 0 15px #00eaff33;
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ffffff22;
}

.hot{color:#ff5252;}
.cold{color:#4fc3f7;}
.rain{color:#4dd0e1;}
.wind{color:#ffd54f;}
.hum{color:#81c784;}
</style>
</head>

<body>

<h1>🌍 Extremos Diários IPMA</h1>
<div id="update"></div>

<div class="container" id="tables"></div>

<script>

const API =
"https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson";

const sections=[
["Temperaturas Máximas","fa-temperature-high"],
["Temperaturas Mínimas","fa-temperature-low"],
["Chuva Acumulada","fa-cloud-rain"],
["Rajadas Vento","fa-wind"],
["Humidade Máxima","fa-droplet"],
["Humidade Mínima","fa-water"],
["Amplitude Térmica","fa-chart-line"]
];

function createTables(){
const c=document.getElementById("tables");
c.innerHTML="";

sections.forEach(s=>{
c.innerHTML+=`
<div class="card">
<h2><i class="fa ${s[1]}"></i> ${s[0]}</h2>
<table>
<tr><th>Local</th><th>Valor</th><th>Hora</th></tr>
<tbody id="${s[0]}"></tbody>
</table>
</div>`;
});
}

function fill(id,data,unit,cls=""){
const tb=document.getElementById(id);
tb.innerHTML="";

data.slice(0,5).forEach(d=>{
tb.innerHTML+=`
<tr>
<td>${d.local}</td>
<td class="${cls}">${d.value}${unit}</td>
<td>${d.time}</td>
</tr>`;
});
}

async function load(){

const r=await fetch(API);
const j=await r.json();

const stations=j.features
.map(f=>{

const p=f.properties;

if(!p.temperature) return null;

return{
local:p.local,
temp:p.temperature,
hum:p.humidity,
rain:p.precipitation ?? 0,
wind:p.windGust ?? 0,
time:p.obsTime?.split(" ")[1] ?? "-"
};

})
.filter(Boolean);

/* TEMPERATURAS */
fill(
"Temperaturas Máximas",
[...stations].sort((a,b)=>b.temp-a.temp)
.map(s=>({local:s.local,value:s.temp,time:s.time}))
,"°C","hot"
);

fill(
"Temperaturas Mínimas",
[...stations].sort((a,b)=>a.temp-b.temp)
.map(s=>({local:s.local,value:s.temp,time:s.time}))
,"°C","cold"
);

/* CHUVA */
fill(
"Chuva Acumulada",
[...stations].sort((a,b)=>b.rain-a.rain)
.map(s=>({local:s.local,value:s.rain,time:s.time}))
," mm","rain"
);

/* VENTO */
fill(
"Rajadas Vento",
[...stations].sort((a,b)=>b.wind-a.wind)
.map(s=>({local:s.local,value:s.wind,time:s.time}))
," km/h","wind"
);

/* HUMIDADE */
fill(
"Humidade Máxima",
[...stations].sort((a,b)=>b.hum-a.hum)
.map(s=>({local:s.local,value:s.hum,time:s.time}))
,"%","hum"
);

fill(
"Humidade Mínima",
[...stations].sort((a,b)=>a.hum-b.hum)
.map(s=>({local:s.local,value:s.hum,time:s.time}))
,"%","hum"
);

/* AMPLITUDE */
const max=Math.max(...stations.map(s=>s.temp));
const min=Math.min(...stations.map(s=>s.temp));
const amp=(max-min).toFixed(1);

fill(
"Amplitude Térmica",
[{local:"Portugal",value:amp,time:new Date().toLocaleTimeString()}],
" °C"
);

document.getElementById("update").innerHTML=
"Última atualização: "+new Date().toLocaleTimeString();

}

createTables();
load();
setInterval(load,300000);

</script>

</body>
</html>
