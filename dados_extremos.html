<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Extremos Diários IPMA</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Segoe UI;
    background:#050816;
    color:white;
}

h1{
    text-align:center;
    color:#00eaff;
    margin:20px;
}

#updateTime{
    text-align:center;
    color:#aaa;
    margin-bottom:10px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:linear-gradient(145deg,#0c122b,#060a1c);
    border-radius:15px;
    box-shadow:0 0 20px #00eaff33;
    padding:15px;
}

.card h2{
    color:#00ffd5;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    border-bottom:1px solid #ffffff22;
}

.hot{color:#ff5252;}
.cold{color:#4fc3f7;}
.rain{color:#4dd0e1;}
.wind{color:#ffd54f;}
.hum{color:#81c784;}

</style>
</head>

<body>

<h1>🌍 Extremos Diários IPMA</h1>
<div id="updateTime"></div>

<div class="container" id="tables"></div>

<script>

const sections = [
{title:"Temperaturas Máximas",icon:"fa-temperature-high"},
{title:"Temperaturas Mínimas",icon:"fa-temperature-low"},
{title:"Chuva Acumulada",icon:"fa-cloud-rain"},
{title:"Rajadas Vento",icon:"fa-wind"},
{title:"Humidade Máxima",icon:"fa-droplet"},
{title:"Humidade Mínima",icon:"fa-water"},
{title:"Amplitude Térmica",icon:"fa-chart-line"}
];

function createTables(){
const container=document.getElementById("tables");
container.innerHTML="";

sections.forEach(sec=>{
container.innerHTML+=`
<div class="card">
<h2><i class="fa ${sec.icon}"></i> ${sec.title}</h2>
<table>
<thead>
<tr>
<th>Local</th>
<th>Valor</th>
<th>Hora</th>
</tr>
</thead>
<tbody id="${sec.title}"></tbody>
</table>
</div>`;
});
}

function colorClass(type,value){
if(value==null) return "";

if(type.includes("Máximas")) return value>30?"hot":"";
if(type.includes("Mínimas")) return value<5?"cold":"";
if(type.includes("Chuva")) return "rain";
if(type.includes("Vento")) return "wind";
if(type.includes("Humidade")) return "hum";

return "";
}

function addRows(title,data,unit){

const tbody=document.getElementById(title);
tbody.innerHTML="";

data.slice(0,5).forEach(d=>{

const cls=colorClass(title,d.value);

tbody.innerHTML+=`
<tr>
<td>${d.local}</td>
<td class="${cls}">${d.value ?? "-"} ${unit}</td>
<td>${d.time}</td>
</tr>`;
});
}

async function loadData(){

const res=await fetch(
"https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson"
);

const json=await res.json();

const stations=json.features
.map(s=>{

const p=s.properties;

if(!p.local) return null;

let amp=null;
if(p.tMax!=null && p.tMin!=null)
amp=(p.tMax-p.tMin).toFixed(1);

return{
local:p.local,
time:p.obsTime?.split(" ")[1] ?? "-",
tmax:p.tMax,
tmin:p.tMin,
rain:p.precAcum,
wind:p.ffGust,
humMax:p.humMax,
humMin:p.humMin,
amp:amp
};

})
.filter(Boolean);

addRows(
"Temperaturas Máximas",
stations.filter(s=>s.tmax!=null)
.sort((a,b)=>b.tmax-a.tmax)
.map(s=>({local:s.local,value:s.tmax,time:s.time}))
,"°C"
);

addRows(
"Temperaturas Mínimas",
stations.filter(s=>s.tmin!=null)
.sort((a,b)=>a.tmin-b.tmin)
.map(s=>({local:s.local,value:s.tmin,time:s.time}))
,"°C"
);

addRows(
"Chuva Acumulada",
stations.filter(s=>s.rain!=null)
.sort((a,b)=>b.rain-a.rain)
.map(s=>({local:s.local,value:s.rain,time:s.time}))
,"mm"
);

addRows(
"Rajadas Vento",
stations.filter(s=>s.wind!=null)
.sort((a,b)=>b.wind-a.wind)
.map(s=>({local:s.local,value:s.wind,time:s.time}))
,"km/h"
);

addRows(
"Humidade Máxima",
stations.filter(s=>s.humMax!=null)
.sort((a,b)=>b.humMax-a.humMax)
.map(s=>({local:s.local,value:s.humMax,time:s.time}))
,"%"
);

addRows(
"Humidade Mínima",
stations.filter(s=>s.humMin!=null)
.sort((a,b)=>a.humMin-b.humMin)
.map(s=>({local:s.local,value:s.humMin,time:s.time}))
,"%"
);

addRows(
"Amplitude Térmica",
stations.filter(s=>s.amp!=null)
.sort((a,b)=>b.amp-a.amp)
.map(s=>({local:s.local,value:s.amp,time:s.time}))
,"°C"
);

document.getElementById("updateTime").innerHTML =
"Última atualização: "+new Date().toLocaleTimeString();

}

createTables();
loadData();

setInterval(loadData,300000); // 5 minutos

</script>

</body>
</html>
