<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Extremos Diários IPMA</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
    font-family: Arial, sans-serif;
    background:#0a0f1f;
    color:white;
    text-align:center;
}

h1{
    margin:20px;
    color:#00eaff;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:rgba(20,30,60,0.8);
    border-radius:15px;
    box-shadow:0 0 15px #00eaff55;
    padding:15px;
}

.card h2{
    color:#00eaff;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    border-bottom:1px solid #ffffff22;
}

th{
    color:#00ffd5;
}

.icon{
    margin-right:8px;
}
</style>
</head>

<body>

<h1>🌍 Extremos Diários IPMA</h1>

<div class="container" id="tables"></div>

<script>

const sections = [
 {title:"Temperaturas Máximas", icon:"fa-temperature-high"},
 {title:"Temperaturas Mínimas", icon:"fa-temperature-low"},
 {title:"Chuva Acumulada", icon:"fa-cloud-rain"},
 {title:"Rajadas Vento", icon:"fa-wind"},
 {title:"Humidade Máxima", icon:"fa-droplet"},
 {title:"Humidade Mínima", icon:"fa-water"},
 {title:"Amplitude Térmica", icon:"fa-chart-line"}
];

function createTables(){
    const container=document.getElementById("tables");

    sections.forEach(sec=>{
        container.innerHTML+=`
        <div class="card">
            <h2><i class="fa ${sec.icon} icon"></i>${sec.title}</h2>
            <table>
                <thead>
                    <tr>
                        <th>Local</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="${sec.title}">
                </tbody>
            </table>
        </div>`;
    });
}

async function loadData(){

const response = await fetch(
"https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson"
);

const data = await response.json();

const stations = data.features.slice(0,5);

stations.forEach(st => {

const name = st.properties.local;
const tmax = st.properties.tMax ?? "-";
const tmin = st.properties.tMin ?? "-";
const rain = st.properties.precAcum ?? "-";
const wind = st.properties.ffGust ?? "-";
const humMax = st.properties.humMax ?? "-";
const humMin = st.properties.humMin ?? "-";

let amplitude="-";
if(tmax!=="-" && tmin!=="-")
 amplitude=(tmax - tmin).toFixed(1);

addRow("Temperaturas Máximas",name,tmax+" °C");
addRow("Temperaturas Mínimas",name,tmin+" °C");
addRow("Chuva Acumulada",name,rain+" mm");
addRow("Rajadas Vento",name,wind+" km/h");
addRow("Humidade Máxima",name,humMax+" %");
addRow("Humidade Mínima",name,humMin+" %");
addRow("Amplitude Térmica",name,amplitude+" °C");

});

}

function addRow(table,local,value){
document.getElementById(table).innerHTML+=`
<tr>
<td>${local}</td>
<td>${value}</td>
</tr>`;
}

createTables();
loadData();

</script>

</body>
</html>
