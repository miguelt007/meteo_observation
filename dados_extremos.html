<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Extremos diários IPMA</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
background:#060b1f;
color:white;
font-family:Segoe UI;
margin:0;
}

h1{
text-align:center;
color:#00eaff;
margin:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#0e1635;
border-radius:15px;
box-shadow:0 0 20px #00eaff33;
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ffffff22;
}

.hot{color:#ff5252;}
.cold{color:#4fc3f7;}
.rain{color:#4dd0e1;}
.wind{color:#ffd54f;}
.hum{color:#81c784;}
</style>
</head>

<body>

<h1>🌍 Extremos Diários IPMA</h1>
<div id="update" style="text-align:center"></div>

<div class="container" id="tables"></div>

<script>

const API="https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson";

const tables=[
["Temperaturas Máximas","temperatura",true,"°C","hot"],
["Temperaturas Mínimas","temperatura",false,"°C","cold"],
["Chuva Acumulada","precAcumulada",true,"mm","rain"],
["Rajadas Vento","intensidadeVentoKM",true,"km/h","wind"],
["Humidade Máxima","humidade",true,"%","hum"],
["Humidade Mínima","humidade",false,"%","hum"]
];

function createTables(){
const c=document.getElementById("tables");
c.innerHTML="";

tables.forEach(t=>{
c.innerHTML+=`
<div class="card">
<h2>${t[0]}</h2>
<table>
<tr><th>Local</th><th>Valor</th><th>Hora</th></tr>
<tbody id="${t[0]}"></tbody>
</table>
</div>`;
});

c.innerHTML+=`
<div class="card">
<h2>Amplitude Térmica</h2>
<table>
<tr><th>Local</th><th>Valor</th><th>Hora</th></tr>
<tbody id="Amplitude"></tbody>
</table>
</div>`;
}

function valid(v){
return v!==null && !isNaN(v);
}

function fill(id,data,unit,cls){
const tb=document.getElementById(id);
tb.innerHTML="";

data.forEach(s=>{
tb.innerHTML+=`
<tr>
<td>${s.local}</td>
<td class="${cls}">${s.value.toFixed(1)} ${unit}</td>
<td>${s.time}</td>
</tr>`;
});
}

async function load(){

const r=await fetch(API);
const j=await r.json();

const stations=j.features.map(f=>{

const p=f.properties;

return{
local:p.localEstacao,
time:new Date(p.time).toLocaleTimeString(),

temperatura:Number(p.temperatura),
humidade:Number(p.humidade),
precAcumulada:Number(p.precAcumulada),
intensidadeVentoKM:Number(p.intensidadeVentoKM)
};

});

/* tabelas principais */
tables.forEach(t=>{

const name=t[0];
const field=t[1];
const desc=t[2];
const unit=t[3];
const cls=t[4];

const sorted=[...stations]
.filter(s=>valid(s[field]))
.sort((a,b)=>desc?
b[field]-a[field]:
a[field]-b[field])
.slice(0,5)
.map(s=>({
local:s.local,
value:s[field],
time:s.time
}));

fill(name,sorted,unit,cls);

});

/* amplitude nacional */
const temps=stations
.filter(s=>valid(s.temperatura))
.map(s=>s.temperatura);

const amp=Math.max(...temps)-Math.min(...temps);

fill("Amplitude",[
{
local:"Portugal",
value:amp,
time:new Date().toLocaleTimeString()
}
],"°C","hot");

document.getElementById("update").innerHTML=
"Última atualização: "+new Date().toLocaleTimeString();

}

createTables();
load();
setInterval(load,300000);

</script>

</body>
</html>
