<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Extremos Diários IPMA</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  background:#060b1f;
  color:white;
  font-family:Segoe UI;
  margin:0;
}

h1{
  text-align:center;
  color:#00eaff;
  margin:20px;
}

#update{
  text-align:center;
  color:#aaa;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#0e1635;
  border-radius:15px;
  box-shadow:0 0 20px #00eaff33;
  padding:15px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #ffffff22;
}

.hot{color:#ff5252;}
.cold{color:#4fc3f7;}
.rain{color:#4dd0e1;}
.wind{color:#ffd54f;}
.hum{color:#81c784;}

.icon{
  margin-right:5px;
}
</style>
</head>

<body>

<h1>🌍 Extremos Diários IPMA</h1>
<div id="update"></div>

<div class="container" id="tables"></div>

<script>
const API = "https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson";

const tables=[
  ["Temperaturas Máximas","temperatura",true,"°C","hot","fa-temperature-high"],
  ["Temperaturas Mínimas","temperatura",false,"°C","cold","fa-temperature-low"],
  ["Chuva Acumulada","precAcumulada",true,"mm","rain","fa-cloud-rain"],
  ["Rajadas Vento","intensidadeVentoKM",true,"km/h","wind","fa-wind"],
  ["Humidade Máxima","humidade",true,"%","hum","fa-droplet"],
  ["Humidade Mínima","humidade",false,"%","hum","fa-water"]
];

// criar tabelas
function createTables(){
  const c=document.getElementById("tables");
  c.innerHTML="";
  tables.forEach(t=>{
    c.innerHTML+=`
      <div class="card">
        <h2><i class="fa ${t[5]} icon"></i>${t[0]}</h2>
        <table>
          <tr><th>Local</th><th>Valor</th><th>Hora</th></tr>
          <tbody id="${t[0]}"></tbody>
        </table>
      </div>`;
  });

  c.innerHTML+=`
    <div class="card">
      <h2><i class="fa fa-temperature-half icon"></i>Sensação Térmica</h2>
      <table>
        <tr><th>Local</th><th>Valor</th><th>Hora</th></tr>
        <tbody id="Sensacao"></tbody>
      </table>
    </div>`;
}

// validar valor real
function valid(v){
  return v!==null && v!==undefined && !isNaN(v) && v>-90;
}

// preencher tabela
function fill(id,data,unit,cls){
  const tb=document.getElementById(id);
  tb.innerHTML="";
  data.forEach(s=>{
    tb.innerHTML+=`
      <tr>
        <td>${s.local}</td>
        <td class="${cls}">${s.value.toFixed(1)} ${unit}</td>
        <td>${s.time}</td>
      </tr>`;
  });
}

// calcular sensação térmica (Wind Chill simplificado)
function sensacaoTermica(T,V){
  // T em °C, V em km/h
  if(!valid(T) || !valid(V)) return T;
  if(T > 10) return T; // acima de 10°C usamos temperatura real
  return 13.12 + 0.6215*T - 11.37*Math.pow(V,0.16) + 0.3965*T*Math.pow(V,0.16);
}

// carregar dados e atualizar tabelas
async function load(){
  try{
    const r = await fetch(API);
    const j = await r.json();

    const now = new Date();
    const timeStr = now.toLocaleTimeString();

    const stations = j.features.map(f=>{
      const p = f.properties;
      return {
        local: p.localEstacao,
        time: timeStr,
        temperatura: Number(p.temperatura),
        humidade: Number(p.humidade),
        precAcumulada: Number(p.precAcumulada),
        intensidadeVentoKM: Number(p.intensidadeVentoKM)
      };
    }).filter(s=>valid(s.temperatura));

    // preencher tabelas principais
    tables.forEach(t=>{
      const name = t[0];
      const field = t[1];
      const desc = t[2];
      const unit = t[3];
      const cls = t[4];

      const sorted = [...stations]
        .filter(s=>valid(s[field]))
        .sort((a,b)=>desc? b[field]-a[field] : a[field]-b[field])
        .slice(0,5)
        .map(s=>({local:s.local,value:s[field],time:s.time}));

      fill(name,sorted,unit,cls);
    });

    // calcular sensação térmica por estação
    const sensacoes = stations
      .map(s=>{
        const val = sensacaoTermica(s.temperatura, s.intensidadeVentoKM);
        return {local:s.local,value:val,time:s.time};
      })
      .sort((a,b)=>b.value-a.value)
      .slice(0,5);

    fill("Sensacao",sensacoes,"°C","hot");

    document.getElementById("update").innerHTML="Última atualização: "+timeStr;

  }catch(err){
    console.error("Erro ao carregar dados IPMA:", err);
  }
}

createTables();
load();

// Atualização a cada 15 minutos
setInterval(load,15*60*1000);

</script>

</body>
</html>
