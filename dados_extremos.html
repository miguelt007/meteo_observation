<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Extremos Diários IPMA</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#050816;
color:white;
font-family:Segoe UI;
margin:0;
}

h1{
text-align:center;
color:#00eaff;
margin:20px;
}

#update{
text-align:center;
color:#aaa;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#0c122b;
border-radius:15px;
box-shadow:0 0 20px #00eaff33;
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ffffff22;
}

.hot{color:#ff5252;}
.cold{color:#4fc3f7;}
.rain{color:#4dd0e1;}
.wind{color:#ffd54f;}
.hum{color:#81c784;}

</style>
</head>

<body>

<h1>🌍 Extremos Diários IPMA</h1>
<div id="update"></div>

<div class="container" id="tables"></div>

<script>

const API =
"https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson";

const tables=[
["Temperaturas Máximas","fa-temperature-high"],
["Temperaturas Mínimas","fa-temperature-low"],
["Chuva Acumulada","fa-cloud-rain"],
["Rajadas Vento","fa-wind"],
["Humidade Máxima","fa-droplet"],
["Humidade Mínima","fa-water"],
["Amplitude Térmica","fa-chart-line"]
];

function createTables(){
const c=document.getElementById("tables");
c.innerHTML="";

tables.forEach(t=>{
c.innerHTML+=`
<div class="card">
<h2><i class="fa ${t[1]}"></i> ${t[0]}</h2>
<table>
<tr><th>Local</th><th>Valor</th><th>Hora</th></tr>
<tbody id="${t[0]}"></tbody>
</table>
</div>`;
});
}

function valid(v){
return v!==null && v!==undefined && v!=-99;
}

function top5(data,field,desc=true){
return data
.filter(s=>valid(s[field]))
.sort((a,b)=>desc?
b[field]-a[field]:
a[field]-b[field])
.slice(0,5);
}

function fill(id,data,field,unit,cls){
const tb=document.getElementById(id);
tb.innerHTML="";

data.forEach(s=>{
tb.innerHTML+=`
<tr>
<td>${s.local}</td>
<td class="${cls}">
${Number(s[field]).toFixed(1)} ${unit}
</td>
<td>${s.time}</td>
</tr>`;
});
}

async function load(){

const r=await fetch(API);
const j=await r.json();

const stations=j.features.map(f=>{

const p=f.properties;

return{
local:p.local,
time:p.obsTime?.split(" ")[1] ?? "-",

temp:Number(p.airTemperature),
hum:Number(p.relativeHumidity),
rain:Number(p.precipitationIntensity),
wind:Number(p.windGust)
};

});

/* TEMPERATURAS */
fill(
"Temperaturas Máximas",
top5(stations,"temp",true),
"temp","°C","hot"
);

fill(
"Temperaturas Mínimas",
top5(stations,"temp",false),
"temp","°C","cold"
);

/* CHUVA */
fill(
"Chuva Acumulada",
top5(stations,"rain",true),
"rain","mm","rain"
);

/* VENTO */
fill(
"Rajadas Vento",
top5(stations,"wind",true),
"wind","km/h","wind"
);

/* HUMIDADE */
fill(
"Humidade Máxima",
top5(stations,"hum",true),
"hum","%","hum"
);

fill(
"Humidade Mínima",
top5(stations,"hum",false),
"hum","%","hum"
);

/* AMPLITUDE */
const validTemps=stations
.filter(s=>valid(s.temp))
.map(s=>s.temp);

const amp=Math.max(...validTemps)-Math.min(...validTemps);

fill(
"Amplitude Térmica",
[{
local:"Portugal",
temp:amp,
time:new Date().toLocaleTimeString()
}],
"temp","°C","hot"
);

document.getElementById("update").innerHTML=
"Última atualização: "+new Date().toLocaleTimeString();

}

createTables();
load();
setInterval(load,300000);

</script>

</body>
</html>
