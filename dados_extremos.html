<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Extremos Diários IPMA</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#060b1f;
color:white;
font-family:Segoe UI;
margin:0;
}

h1{
text-align:center;
color:#00eaff;
margin:20px;
}

#update{
text-align:center;
color:#aaa;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#0e1635;
border-radius:14px;
box-shadow:0 0 20px #00eaff33;
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ffffff22;
}

.hot{color:#ff5252;}
.cold{color:#4fc3f7;}
.hum{color:#81c784;}
.wind{color:#ffd54f;}
.rain{color:#4dd0e1;}

</style>
</head>

<body>

<h1>🌍 Extremos Diários IPMA</h1>
<div id="update"></div>

<div class="container" id="tables"></div>

<script>

const API="https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson";

const tables=[
["Temperaturas Máximas","fa-temperature-high"],
["Temperaturas Mínimas","fa-temperature-low"],
["Chuva Acumulada","fa-cloud-rain"],
["Rajadas Vento","fa-wind"],
["Humidade Máxima","fa-droplet"],
["Humidade Mínima","fa-water"],
["Amplitude Térmica","fa-chart-line"]
];

function createTables(){
const c=document.getElementById("tables");
c.innerHTML="";

tables.forEach(t=>{
c.innerHTML+=`
<div class="card">
<h2><i class="fa ${t[1]}"></i> ${t[0]}</h2>
<table>
<tr><th>Local</th><th>Valor</th><th>Hora</th></tr>
<tbody id="${t[0]}"></tbody>
</table>
</div>`;
});
}

function fill(id,data,unit,cls=""){
const tb=document.getElementById(id);
tb.innerHTML="";

data.slice(0,5).forEach(d=>{
tb.innerHTML+=`
<tr>
<td>${d.local}</td>
<td class="${cls}">${d.value}${unit}</td>
<td>${d.time}</td>
</tr>`;
});
}

async function load(){

const r=await fetch(API);
const j=await r.json();

const stations=j.features.map(f=>{

const p=f.properties;

if(
p.airTemperature==null ||
p.airTemperature==-99
) return null;

return{
local:p.stationName,
temp:Number(p.airTemperature),
hum:Number(p.relativeHumidity),
rain:Number(p.precipitationIntensity)||0,
wind:Number(p.windGust)||0,
time:p.obsTime?.split(" ")[1] ?? "-"
};

}).filter(Boolean);

/* Temperaturas */
fill(
"Temperaturas Máximas",
[...stations].sort((a,b)=>b.temp-a.temp),
" °C","hot"
);

fill(
"Temperaturas Mínimas",
[...stations].sort((a,b)=>a.temp-b.temp),
" °C","cold"
);

/* Chuva */
fill(
"Chuva Acumulada",
[...stations].sort((a,b)=>b.rain-a.rain),
" mm","rain"
);

/* Vento */
fill(
"Rajadas Vento",
[...stations].sort((a,b)=>b.wind-a.wind),
" km/h","wind"
);

/* Humidade */
fill(
"Humidade Máxima",
[...stations].sort((a,b)=>b.hum-a.hum),
"%","hum"
);

fill(
"Humidade Mínima",
[...stations].sort((a,b)=>a.hum-b.hum),
"%","hum"
);

/* Amplitude nacional */
const max=Math.max(...stations.map(s=>s.temp));
const min=Math.min(...stations.map(s=>s.temp));

fill(
"Amplitude Térmica",
[{
local:"Portugal",
value:(max-min).toFixed(1),
time:new Date().toLocaleTimeString()
}],
" °C"
);

document.getElementById("update").innerHTML=
"Última atualização: "+new Date().toLocaleTimeString();

}

createTables();
load();
setInterval(load,300000);

</script>

</body>
</html>
